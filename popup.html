<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Renamer</title>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #333;
    }
    
    .current-tab {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    
    .current-tab .label {
      font-weight: 600;
      color: #666;
      margin-bottom: 5px;
    }
    
    .current-tab .value {
      color: #333;
      word-break: break-all;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #0078d4;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
    }
    
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .btn-primary {
      background: #0078d4;
      color: white;
    }
    
    .btn-primary:hover {
      background: #006cbd;
    }
    
    .btn-secondary {
      background: #e1e1e1;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #d1d1d1;
    }
    
    .message {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    
    .message.success {
      background: #dff6dd;
      color: #107c10;
      display: block;
    }
    
    .message.error {
      background: #fde7e9;
      color: #a80000;
      display: block;
    }
  </style>
</head>
<body>
  <h2>Rename Current Tab</h2>
  
  <div class="current-tab">
    <div class="label">Original Title:</div>
    <div class="value" id="originalTitle">Loading...</div>
  </div>
  
  <div class="input-group">
    <label for="newTitle">New Tab Name:</label>
    <input type="text" id="newTitle" placeholder="Enter custom tab name">
  </div>
  
  <div class="button-group">
    <button class="btn-primary" id="renameBtn">Rename Tab</button>
    <button class="btn-secondary" id="resetBtn">Reset</button>
  </div>
  
  <div class="message" id="message"></div>
  
  <script src="popup.js"></script>
</body>
</html>
